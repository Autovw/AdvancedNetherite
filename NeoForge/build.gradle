plugins {
    id 'idea'
    id 'net.neoforged.moddev'
}

group = 'com.autovw.advancednetherite'
version = "${mod_version}-${minecraft_version}"
base.archivesName = 'advancednetherite-neoforge'

repositories {
    mavenLocal()
    maven {
        url = "https://www.cursemaven.com"
    }
}

neoForge {
    version = neoforge_version

    runs {
        configureEach {
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            systemProperty 'neoforge.logging.markers', 'REGISTRIES'
            systemProperty 'neoforge.logging.console.level', 'debug'
        }

        client {
            client()
        }

        server {
            server()
            programArgument '--nogui'
        }

        data {
            clientData()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
    }
    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

dependencies {
    implementation "net.neoforged:neoforge:${neoforge_version}"
    compileOnly project(path: ':Common')

    //runtimeOnly "curse.maven:catalogue-459701:${catalogue_neoforge_version}"
    //runtimeOnly "curse.maven:configured-457570:${configured_neoforge_version}"
    //runtimeOnly "curse.maven:jei-238222:${jei_neoforge_version}"
}

tasks.withType(JavaCompile).configureEach {
    source(project(":Common").sourceSets.main.allSource)
}

processResources {
    from project(":Common").sourceSets.main.resources
}

tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            mod_version: mod_version
    ]
    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
    inputs.properties replaceProperties
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

